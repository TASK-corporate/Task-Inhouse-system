<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社用車レンタル - 顧客向け</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif; background:#1f2937; }
    .customer-container { max-width:448px; margin:0 auto; min-height:100vh; }
    .customer-header { background:#fff; padding:24px; border-bottom:1px solid #374151; }
    .customer-header h1 { font-size:24px; font-weight:bold; letter-spacing:.05em; }
    .customer-header p { font-size:14px; color:#6b7280; margin-top:4px; }
    .loading-container { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:400px; gap:16px; }
    .loading-spinner { width:40px; height:40px; border:4px solid #e5e7eb; border-top-color:#fff; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { color:#9ca3af; font-size:14px; }
    .error-container { background:#fee; border:1px solid #fcc; color:#c33; padding:16px; margin:16px; text-align:center; }
    .retry-btn { margin-top:12px; padding:8px 16px; background:#000; color:#fff; border:none; cursor:pointer; font-weight:600; }
    .vehicle-list { padding:16px; display:flex; flex-direction:column; gap:12px; }
    .vehicle-card { background:#fff; border-left:4px solid #000; cursor:pointer; transition:transform .2s; position:relative; }
    .vehicle-card:hover { transform:translateX(4px); }
    .vehicle-card.unavailable::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:1; pointer-events:none; }
    .vehicle-card-inner { position:relative; z-index:0; }
    .vehicle-image { width:100%; height:200px; object-fit:cover; background:#f3f4f6; }
    .vehicle-card-content { padding:20px; }
    .vehicle-card h2 { font-size:20px; font-weight:bold; margin-bottom:16px; }
    .info-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:12px; }
    .info-item { border-bottom:1px solid #d1d5db; padding-bottom:8px; }
    .info-item.full { grid-column:span 2; }
    .info-label { font-size:12px; color:#6b7280; margin-bottom:4px; }
    .info-value { font-size:16px; }
    .info-value.bold { font-weight:bold; }
    .badge { display:inline-block; padding:4px 12px; font-size:12px; font-weight:600; color:#fff; }
    .badge-ok { background:#059669; }
    .badge-ng { background:#6b7280; }

    .detail-view { position:fixed; top:0; left:0; right:0; bottom:0; background:#1f2937; z-index:100; overflow-y:auto; }
    .detail-container { max-width:448px; margin:0 auto; min-height:100vh; }
    .detail-header { background:#fff; border-bottom:1px solid #d1d5db; position:sticky; top:0; z-index:10; }
    .detail-header-inner { padding:16px; display:flex; align-items:center; gap:12px; }
    .back-btn { padding:8px; background:none; border:none; cursor:pointer; }
    .detail-header h2 { font-size:18px; font-weight:bold; }
    .detail-content { background:#fff; margin:16px; }
    .gallery { position:relative; background:#f3f4f6; }
    .main-img-wrap { position:relative; width:100%; height:300px; background:#000; }
    .main-img { width:100%; height:100%; object-fit:contain; background:#000; }
    .img-counter { position:absolute; bottom:12px; right:12px; background:rgba(0,0,0,.7); color:#fff; padding:4px 12px; border-radius:16px; font-size:12px; font-weight:600; }
    .thumb-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:12px; background:#f9fafb; }
    .thumb { aspect-ratio:1; border:2px solid transparent; border-radius:4px; overflow:hidden; cursor:pointer; }
    .thumb:hover { transform:scale(1.05); }
    .thumb.active { border-color:#000; }
    .thumb img { width:100%; height:100%; object-fit:cover; }
    .detail-info { padding:24px; }
    .detail-title { font-size:24px; font-weight:bold; margin-bottom:16px; }
    .detail-list { display:flex; flex-direction:column; gap:16px; }
    .d-item { border-bottom:1px solid #e5e7eb; padding-bottom:12px; }
    .d-label { font-size:14px; color:#6b7280; margin-bottom:4px; }
    .d-value { font-size:18px; font-weight:600; }
    .contact-btn { width:100%; background:#22c55e; color:#fff; padding:16px; font-size:16px; font-weight:bold; border:none; cursor:pointer; margin-top:24px; }
    .contact-btn:hover { background:#16a34a; }
    .contact-btn:disabled { background:#9ca3af; cursor:not-allowed; }
    .hidden { display:none; }
    svg { width:24px; height:24px; }
  </style>
  <script src="../config.js"></script>
</head>
<body>
<div id="listView" class="customer-container">
  <div class="customer-header"><h1>CORPORATE CAR RENTAL</h1><p>法人向け車両レンタルサービス</p></div>
  <div id="loadingContainer" class="loading-container"><div class="loading-spinner"></div><div class="loading-text">車両情報を読み込んでいます...</div></div>
  <div id="errorContainer" class="error-container hidden"><p id="errorMessage">読み込み失敗</p><button class="retry-btn" onclick="fetchData()">再試行</button></div>
  <div class="vehicle-list hidden" id="vehicleList"></div>
</div>

<div id="detailView" class="detail-view hidden">
  <div class="detail-container">
    <div class="detail-header"><div class="detail-header-inner">
      <button class="back-btn" id="backButton"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
      <h2>車両詳細</h2>
    </div></div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<script>
var GAS_URL = APP_CONFIG.GAS_URL;
var API_KEY = APP_CONFIG.API_KEY_CLIENT;
var vehicles=[];

function fetchData(){
  document.getElementById('loadingContainer').classList.remove('hidden');
  document.getElementById('errorContainer').classList.add('hidden');
  document.getElementById('vehicleList').classList.add('hidden');
  fetch(GAS_URL+'?role=client&key='+API_KEY)
    .then(function(r){return r.json();})
    .then(function(d){
      vehicles=d;
      if(Array.isArray(d)&&d.length>0){renderList();document.getElementById('loadingContainer').classList.add('hidden');document.getElementById('vehicleList').classList.remove('hidden');}
      else throw new Error('0件');
    })
    .catch(function(err){document.getElementById('loadingContainer').classList.add('hidden');document.getElementById('errorContainer').classList.remove('hidden');document.getElementById('errorMessage').textContent='読み込み失敗: '+err.message;});
}

function renderList(){
  var sorted=vehicles.slice().sort(function(a,b){return a.status==='貸出可'?-1:b.status==='貸出可'?1:0;});
  var html='';
  sorted.forEach(function(v){
    var ok=v.status==='貸出可';
    var img=v.images&&v.images.length>0?(typeof v.images[0]==='object'?v.images[0].url:v.images[0]):'https://placehold.co/400x300/e5e7eb/6b7280?text=No+Image';
    html+='<div class="vehicle-card'+(ok?'':' unavailable')+'" onclick="showDetail('+v.id+')">'
      +'<div class="vehicle-card-inner">'
      +'<img src="'+img+'" class="vehicle-image" alt="'+(v.carModel||'')+'">'
      +'<div class="vehicle-card-content">'
      +'<h2>'+(v.carModel||'車種不明')+'</h2>'
      +'<div class="info-grid">'
      +'<div class="info-item"><div class="info-label">価格</div><div class="info-value bold">'+(v.price?v.price.toLocaleString()+'円/月':'未設定')+'</div></div>'
      +'<div class="info-item"><div class="info-label">ステータス</div><div><span class="badge '+(ok?'badge-ok':'badge-ng')+'">'+v.status+'</span></div></div>'
      +'<div class="info-item"><div class="info-label">駆動方式</div><div class="info-value">'+(v.driveType||'-')+'</div></div>'
      +'<div class="info-item"><div class="info-label">スモークガラス</div><div class="info-value">'+(v.smokeGlass||'-')+'</div></div>'
      +'</div>'
      +'<div class="info-item full"><div class="info-label">対応エリア</div><div class="info-value">'+(v.area||'-')+'</div></div>'
      +'</div></div></div>';
  });
  document.getElementById('vehicleList').innerHTML=html;
}

function showDetail(id){
  var v=vehicles.find(function(x){return x.id===id;});
  if(!v) return;
  var ok=v.status==='貸出可';

  // 画像ギャラリー
  var gHtml='';
  if(v.images&&v.images.length>0){
    var firstUrl=typeof v.images[0]==='object'?v.images[0].url:v.images[0];
    if(firstUrl.indexOf('placehold')===-1){
      gHtml='<div class="gallery"><div class="main-img-wrap"><img id="mainImage" src="'+firstUrl+'" class="main-img"><div class="img-counter"><span id="imgNum">1</span> / '+v.images.length+'</div></div>';
      if(v.images.length>1){gHtml+='<div class="thumb-grid">';v.images.forEach(function(img,i){var u=typeof img==='object'?img.url:img;gHtml+='<div class="thumb'+(i===0?' active':'')+'" onclick="changeImg('+i+','+v.id+')"><img src="'+u+'"></div>';});gHtml+='</div>';}
      gHtml+='</div>';
    } else { gHtml='<img src="https://placehold.co/400x300/e5e7eb/6b7280?text=No+Image" class="main-img">'; }
  } else { gHtml='<img src="https://placehold.co/400x300/e5e7eb/6b7280?text=No+Image" class="main-img">'; }

  document.getElementById('detailContent').innerHTML=gHtml
    +'<div class="detail-info">'
    +'<h1 class="detail-title">'+(v.carModel||'車種不明')+'</h1>'
    +'<div class="detail-list">'
    +'<div class="d-item"><div class="d-label">価格</div><div class="d-value">'+(v.price?v.price.toLocaleString()+'円/月':'未設定')+'</div></div>'
    +'<div class="d-item"><div class="d-label">対応エリア</div><div class="d-value">'+(v.area||'-')+'</div></div>'
    +'<div class="d-item"><div class="d-label">車検満了日</div><div class="d-value">'+(v.inspection||'-')+'</div></div>'
    +'<div class="d-item"><div class="d-label">駆動方式</div><div class="d-value">'+(v.driveType||'-')+'</div></div>'
    +'<div class="d-item"><div class="d-label">スモークガラス</div><div class="d-value">'+(v.smokeGlass||'-')+'</div></div>'
    +'<div class="d-item"><div class="d-label">ステータス</div><div><span class="badge '+(ok?'badge-ok':'badge-ng')+'">'+v.status+'</span></div></div>'
    +'</div>'
    +(ok?'<button class="contact-btn" onclick="contact(\''+((v.carModel||'').replace(/'/g,"\\'"))+'\')">LINEで予約する</button>':'<button class="contact-btn" disabled>現在貸出できません</button>')
    +'</div>';
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
}

function changeImg(i,vid){
  var v=vehicles.find(function(x){return x.id===vid;});
  if(!v||!v.images[i]) return;
  var url=typeof v.images[i]==='object'?v.images[i].url:v.images[i];
  document.getElementById('mainImage').src=url;
  document.getElementById('imgNum').textContent=i+1;
  document.querySelectorAll('.thumb').forEach(function(t,j){t.classList.toggle('active',j===i);});
}

function contact(model){
  var text='【車両予約希望】\n車種: '+model+'\n\nこちらの車両の予約を希望します。';
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){alert('予約内容をコピーしました。LINEで送信してください。');});}
  else{alert('こちらをLINEで送信:\n\n'+text);}
}

document.getElementById('backButton').addEventListener('click',function(){
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('listView').classList.remove('hidden');
});

fetchData();
</script>
</body>
</html>
