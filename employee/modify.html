<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>車両情報修正 - 社用車管理システム</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif; background:#f3f4f6; color:#111; min-height:100vh; }
    .header { background:#fff; padding:16px; border-bottom:1px solid #d1d5db; position:sticky; top:0; z-index:10; }
    .header-inner { max-width:720px; margin:0 auto; display:flex; align-items:center; gap:12px; }
    .back-link { display:flex; align-items:center; gap:5px; color:#6b7280; text-decoration:none; font-size:13px; }
    .back-link:hover { color:#000; }
    .back-link svg { width:15px; height:15px; }
    .header-sep { color:#d1d5db; font-size:13px; }
    .header h1 { font-size:18px; font-weight:700; }
    .container { max-width:720px; margin:0 auto; padding:24px 16px 80px; }
    .search-section { background:#fff; border:1px solid #e5e7eb; margin-bottom:16px; padding:20px; }
    .search-label { font-size:12px; font-weight:600; color:#6b7280; margin-bottom:6px; }
    .search-wrap { position:relative; }
    .search-wrap input { width:100%; padding:12px 14px; border:2px solid #111; font-size:15px; font-weight:600; }
    .search-wrap input:focus { outline:none; }
    .suggest-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1.5px solid #111; border-top:none; max-height:240px; overflow-y:auto; z-index:50; display:none; box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .suggest-list.open { display:block; }
    .suggest-item { padding:10px 14px; cursor:pointer; border-bottom:1px solid #e5e7eb; }
    .suggest-item:last-child { border-bottom:none; }
    .suggest-item:hover { background:#f3f4f6; }
    .suggest-plate { font-weight:700; font-size:14px; }
    .suggest-sub { font-size:12px; color:#6b7280; margin-top:2px; }
    /* 車両一覧 */
    .vehicle-list { margin-bottom:16px; }
    .vehicle-list-title { font-size:13px; color:#6b7280; margin-bottom:8px; }
    .vl-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#fff; border:1px solid #e5e7eb; margin-bottom:4px; cursor:pointer; transition:border-color .15s; }
    .vl-item:hover { border-color:#111; }
    .vl-plate { font-weight:700; font-size:14px; }
    .vl-info { font-size:12px; color:#6b7280; margin-top:2px; }
    .vl-arrow { color:#9ca3af; flex-shrink:0; }
    .status-bar { padding:12px 20px; font-size:13px; display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .status-bar.loaded { background:#d1fae5; color:#065f46; border:1px solid #a7f3d0; }
    .status-bar.error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
    .form-section { background:#fff; border:1px solid #e5e7eb; margin-bottom:16px; display:none; }
    .form-section.visible { display:block; }
    .form-section-title { font-size:11px; font-weight:700; color:#374151; text-transform:uppercase; letter-spacing:.06em; padding:14px 20px 10px; border-bottom:1px solid #e5e7eb; }
    .form-section-body { padding:16px 20px 20px; }
    .change-hint { font-size:12px; color:#9ca3af; padding:0 20px 12px; }
    .form-row { display:flex; gap:12px; margin-bottom:14px; }
    .form-row:last-child { margin-bottom:0; }
    @media(max-width:600px) { .form-row { flex-direction:column; } }
    .fg { display:flex; flex-direction:column; gap:5px; flex:1; min-width:0; }
    .fg label { font-size:12px; font-weight:600; color:#6b7280; }
    .fg input, .fg select { padding:10px 12px; border:1.5px solid #d1d5db; font-size:14px; color:#111; width:100%; background:#fff; -webkit-appearance:none; }
    .fg input:focus, .fg select:focus { outline:none; border-color:#111; }
    .fg .cv { font-size:11px; color:#9ca3af; margin-top:2px; }
    .fg input.changed, .fg select.changed { border-color:#f59e0b; background:#fffbeb; }
    /* 画像管理 */
    .img-section-title { font-size:13px; font-weight:700; color:#374151; margin-bottom:8px; }
    .images-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; margin-bottom:8px; }
    .img-wrap { position:relative; }
    .img-wrap img { width:100%; height:100px; object-fit:cover; border:2px solid #e5e7eb; cursor:pointer; }
    .img-wrap img:hover { border-color:#000; }
    .img-del-btn { position:absolute; top:2px; right:2px; width:24px; height:24px; background:rgba(0,0,0,.7); color:#fff; border:none; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0.7; transition:opacity .2s; }
    .img-wrap:hover .img-del-btn { opacity:1; }
    .img-add-btn { padding:8px 16px; background:#fff; border:2px dashed #d1d5db; color:#6b7280; font-size:13px; font-weight:600; cursor:pointer; width:100%; }
    .img-add-btn:hover { border-color:#111; color:#111; }
    .img-status { font-size:12px; color:#6b7280; margin-top:4px; }
    .submit-area { padding:20px; background:#fff; border:1px solid #e5e7eb; display:none; }
    .submit-area.visible { display:block; }
    .submit-btn { width:100%; padding:14px; background:#111; color:#fff; border:none; font-size:15px; font-weight:700; cursor:pointer; }
    .submit-btn:hover { background:#333; }
    .submit-btn:disabled { background:#9ca3af; cursor:not-allowed; }
    .change-count { font-size:13px; color:#6b7280; text-align:center; margin-top:10px; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e293b; color:#fff; padding:12px 24px; font-size:14px; font-weight:600; z-index:999; transition:transform .3s ease; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.error { background:#dc2626; }
    .loading-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,.8); z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
    .loading-overlay.active { display:flex; }
    .spinner-lg { width:32px; height:32px; border:3px solid #e5e7eb; border-top-color:#111; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <script src="../config.js"></script>
  <script src="../auth.js"></script>
</head>
<body>
<div class="header"><div class="header-inner">
  <a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>車両一覧</a>
  <span class="header-sep">/</span><h1>車両情報修正</h1>
</div></div>
<div class="container">
  <div class="search-section">
    <div class="search-label">修正する車両を検索または一覧から選択</div>
    <div class="search-wrap">
      <input type="text" id="searchPlate" placeholder="ナンバー・車種で検索..." autocomplete="off" oninput="filterList()">
      <div class="suggest-list" id="suggestList"></div>
    </div>
  </div>

  <!-- 車両一覧 -->
  <div class="vehicle-list" id="vehicleList"></div>

  <div id="statusBar" style="display:none;"></div>

  <div class="form-section" id="sec1">
    <div class="form-section-title">運用情報</div>
    <div class="change-hint">変更したい項目だけ編集。黄色 = 変更あり</div>
    <div class="form-section-body">
      <div class="form-row">
        <div class="fg"><label>車種</label><input type="text" id="eCarModel" data-field="carModel"><div class="cv" id="cvCarModel"></div></div>
        <div class="fg"><label>車台番号</label><input type="text" id="eChassis" data-field="chassisNumber"><div class="cv" id="cvChassisNumber"></div></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>状態</label><select id="eStatus" data-field="status"><option value="貸出中">貸出中</option><option value="販売可">販売可</option><option value="販売済">販売済</option><option value="貸出可">貸出可</option><option value="修理中">修理中</option><option value="要修理">要修理</option><option value="代車">代車</option><option value="事故廃車">事故廃車</option><option value="故障廃車">故障廃車</option><option value="その他">その他</option></select><div class="cv" id="cvStatus"></div></div>
        <div class="fg"><label>エリア</label><select id="eArea" data-field="area"><option value="">未設定</option><option value="大阪">大阪</option><option value="名古屋">名古屋</option><option value="東京">東京</option></select><div class="cv" id="cvArea"></div></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>貸出先</label><select id="eLoanDest" data-field="loanDest"><option value="">未設定</option></select><div class="cv" id="cvLoanDest"></div></div>
        <div class="fg"><label>使用者</label><input type="text" id="eUser" data-field="user"><div class="cv" id="cvUser"></div></div>
      </div>
    </div>
  </div>
  <div class="form-section" id="sec2">
    <div class="form-section-title">契約情報</div>
    <div class="form-section-body">
      <div class="form-row">
        <div class="fg"><label>所有者</label><select id="eOwner" data-field="owner"><option value="株式会社TASK">株式会社TASK</option><option value="オリックス">オリックス</option><option value="W-FINANCE(TASK)">W-FINANCE(TASK)</option><option value="その他">その他</option></select><div class="cv" id="cvOwner"></div></div>
        <div class="fg"><label>任意保険</label><input type="text" id="eInsurance" data-field="insurance"><div class="cv" id="cvInsurance"></div></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>レンタル料金</label><input type="number" id="ePrice" data-field="price"><div class="cv" id="cvPrice"></div></div>
      </div>
    </div>
  </div>
  <div class="form-section" id="sec3">
    <div class="form-section-title">日付情報</div>
    <div class="form-section-body">
      <div class="form-row">
        <div class="fg"><label>車検満了日</label><input type="date" id="eInspection" data-field="inspection"><div class="cv" id="cvInspection"></div></div>
        <div class="fg"><label>オイル交換日</label><input type="date" id="eOil" data-field="oil"><div class="cv" id="cvOil"></div></div>
      </div>
    </div>
  </div>
  <div class="form-section" id="sec4">
    <div class="form-section-title">車両スペック</div>
    <div class="form-section-body">
      <div class="form-row">
        <div class="fg"><label>駆動方式</label><select id="eDriveType" data-field="driveType"><option value="">未設定</option><option value="2WD">2WD</option><option value="4WD">4WD</option></select><div class="cv" id="cvDriveType"></div></div>
        <div class="fg"><label>リモコンキー</label><select id="eRemoteKey" data-field="remoteKey"><option value="">未設定</option><option value="あり">あり</option><option value="なし">なし</option></select><div class="cv" id="cvRemoteKey"></div></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>スモークガラス</label><select id="eSmokeGlass" data-field="smokeGlass"><option value="">未設定</option><option value="あり">あり</option><option value="なし">なし</option></select><div class="cv" id="cvSmokeGlass"></div></div>
        <div class="fg"><label>現走行距離（km）</label><input type="number" id="eMileageCurrent" data-field="mileageCurrent"><div class="cv" id="cvMileageCurrent"></div></div>
      </div>
    </div>
  </div>
  <div class="form-section" id="sec5">
    <div class="form-section-title">備考</div>
    <div class="form-section-body">
      <div class="form-row">
        <div class="fg"><label>備考</label><input type="text" id="eNote" data-field="note"><div class="cv" id="cvNote"></div></div>
      </div>
    </div>
  </div>
  <!-- 画像管理セクション -->
  <div class="form-section" id="sec6">
    <div class="form-section-title">画像管理</div>
    <div class="form-section-body" id="imageEditArea"></div>
  </div>
  <div class="submit-area" id="submitArea">
    <button class="submit-btn" id="submitBtn" onclick="submitModify()">変更を保存する</button>
    <div class="change-count" id="changeCount"></div>
  </div>
</div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner-lg"></div><div style="font-size:14px;color:#6b7280;">保存中...</div></div>
<div class="toast" id="toast"></div>
<script>
var GAS_URL = APP_CONFIG.GAS_URL;
var API_KEY = APP_CONFIG.API_KEY_EMPLOYEE;
var vehicleCache=[],vehicleLoaded=false,originalData=null,selectedPlate='';
var clientsCache=[];

// 取引先リスト読み込み（貸出先ドロップダウン用）
(function(){
  fetch(GAS_URL+'?action=clients&key='+API_KEY)
    .then(function(r){return r.json();})
    .then(function(data){if(Array.isArray(data))clientsCache=data;})
    .catch(function(){});
})();

function loadVehicles(callback) {
  var el=document.getElementById('vehicleList');
  if(!el){console.error('[modify] vehicleList要素が見つかりません');return;}
  el.innerHTML='<div style="color:#9ca3af;text-align:center;padding:20px">車両データ読み込み中...</div>';
  console.log('[modify] loadVehicles開始: '+GAS_URL+'?role=employee&key=...');
  fetch(GAS_URL+'?role=employee&key='+API_KEY)
    .then(function(r){console.log('[modify] fetchレスポンス: status='+r.status);return r.json();})
    .then(function(d){
      console.log('[modify] データ取得完了: isArray='+Array.isArray(d)+', length='+(Array.isArray(d)?d.length:'N/A'));
      if(Array.isArray(d)){
        vehicleCache=d;vehicleLoaded=true;renderVehicleList();
      }else{
        console.error('[modify] エラーレスポンス:',d);
        el.innerHTML='<div style="color:#dc2626;text-align:center;padding:20px">データ取得エラー: '+(d.error||'不明')+'<br><button onclick="loadVehicles()" style="margin-top:8px;padding:8px 16px;border:1px solid #d1d5db;background:#fff;cursor:pointer">再試行</button></div>';
      }
      if(callback)callback();
    })
    .catch(function(err){
      console.error('[modify] fetch失敗:',err);
      el.innerHTML='<div style="color:#dc2626;text-align:center;padding:20px">通信エラー: '+(err.message||'')+'<br><button onclick="loadVehicles()" style="margin-top:8px;padding:8px 16px;border:1px solid #d1d5db;background:#fff;cursor:pointer">再試行</button></div>';
      if(callback)callback();
    });
}

// 車両一覧表示
function renderVehicleList(filter){
  var el=document.getElementById('vehicleList');
  var kw=(filter||'').trim().toLowerCase();
  var list=vehicleCache;
  if(kw){list=list.filter(function(v){return(v.plateNumber||'').toLowerCase().indexOf(kw)!==-1||(v.carModel||'').toLowerCase().indexOf(kw)!==-1||(v.loanDest||'').toLowerCase().indexOf(kw)!==-1;});}
  if(!list.length){el.innerHTML=kw?'<div style="color:#9ca3af;text-align:center;padding:20px">一致する車両がありません</div>':'';return;}
  el.innerHTML='<div class="vehicle-list-title">'+list.length+'台'+(kw?' (絞込中)':'')+'</div>'
    +list.map(function(v){
      return '<div class="vl-item" onclick="selectVehicle(\''+((v.plateNumber||'').replace(/'/g,"\\'"))+'\')">'
        +'<div><div class="vl-plate">'+(v.plateNumber||'-')+'</div><div class="vl-info">'+(v.carModel||'')+' ／ '+(v.status||'')+' ／ '+(v.loanDest||'未貸出')+'</div></div>'
        +'<div class="vl-arrow"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></div></div>';
    }).join('');
}
function filterList(){renderVehicleList(document.getElementById('searchPlate').value);}

// サジェスト（エンターキー用に残す）
var searchInput=document.getElementById('searchPlate');
searchInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var q=this.value.trim().toLowerCase();
    var f=vehicleCache.find(function(v){return(v.plateNumber||'').toLowerCase()===q;});
    if(f){e.preventDefault();selectVehicle(f.plateNumber);}
  }
});

function selectVehicle(plate){
  document.getElementById('searchPlate').value=plate;
  selectedPlate=plate;
  var v=vehicleCache.find(function(x){return x.plateNumber===plate;});
  if(!v){showStatus('error','データが見つかりません');return;}
  originalData=v;
  showStatus('loaded',plate+' を読み込みました');
  // 一覧を非表示
  document.getElementById('vehicleList').style.display='none';
  // フォームに値をセット
  document.querySelectorAll('[data-field]').forEach(function(el){
    var field=el.getAttribute('data-field');
    var val=v[field]; if(val===undefined||val===null) val='';
    // 貸出先はドロップダウンなので別処理
    if(field==='loanDest'){
      var sel=el;sel.innerHTML='<option value="">未設定</option>';
      var found=false;
      clientsCache.forEach(function(c){
        var s=(c.companyName===String(val))?'selected':'';
        if(s)found=true;
        sel.innerHTML+='<option value="'+c.companyName+'" '+s+'>'+c.companyName+'</option>';
      });
      if(val&&!found)sel.innerHTML+='<option value="'+val+'" selected>'+val+'</option>';
    }else{
      el.value=String(val);
    }
    el.classList.remove('changed');
    var cv=document.getElementById('cv'+field.charAt(0).toUpperCase()+field.slice(1));
    if(cv) cv.textContent='現在: '+(val||'未設定');
  });
  ['sec1','sec2','sec3','sec4','sec5','sec6'].forEach(function(id){document.getElementById(id).classList.add('visible');});
  document.getElementById('submitArea').classList.add('visible');
  // 画像セクション描画
  renderImageEdit(v);
  updateChangeCount();
  document.querySelectorAll('[data-field]').forEach(function(el){
    el.removeEventListener('input',onFieldChange);el.removeEventListener('change',onFieldChange);
    el.addEventListener('input',onFieldChange);el.addEventListener('change',onFieldChange);
  });
}

// 画像編集エリア
function renderImageEdit(v){
  var area=document.getElementById('imageEditArea');
  area.innerHTML=buildImgEdit('公開画像（顧客にも表示）',v.imagesPublic,'public')
    +buildImgEdit('社内画像（社内のみ）',v.imagesInternal,'internal');
}
function buildImgEdit(title,images,type){
  var inputId='mImgUpload_'+type;
  var statusId='mImgStatus_'+type;
  var html='<div style="margin-bottom:16px"><div class="img-section-title">'+title+(images&&images.length?' ('+images.length+'枚)':'')+'</div>';
  if(images&&images.length>0){
    html+='<div class="images-grid">';
    images.forEach(function(img){
      var url=typeof img==='object'?img.url:img;
      var fid=typeof img==='object'?img.fileId:'';
      html+='<div class="img-wrap"><img src="'+url+'" onclick="window.open(\''+url+'\',\'_blank\')">';
      if(fid){html+='<button class="img-del-btn" onclick="event.stopPropagation();mDeleteImage(\''+fid+'\',\''+type+'\')">×</button>';}
      html+='</div>';
    });
    html+='</div>';
  }
  html+='<button class="img-add-btn" onclick="document.getElementById(\''+inputId+'\').click()">＋ 画像を追加</button>'
    +'<input type="file" id="'+inputId+'" multiple accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" onchange="mUploadImages(this.files,\''+type+'\')">'
    +'<div class="img-status" id="'+statusId+'"></div></div>';
  return html;
}

// 画像圧縮（最大800px、JPEG品質60%→高速化）
function compressImage(file,callback){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=800,w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      callback({name:file.name.replace(/\.\w+$/,'.jpg'),base64:c.toDataURL('image/jpeg',0.6)});
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

var mFolderIdCache={};

function mUploadImages(files,type){
  if(!originalData||!files.length)return;
  var status=document.getElementById('mImgStatus_'+type);
  status.textContent='圧縮中...';
  var images=[];var loaded=0;
  Array.from(files).forEach(function(file){
    compressImage(file,function(result){
      images.push(result);loaded++;
      status.textContent='圧縮中... ('+loaded+'/'+files.length+')';
      if(loaded===files.length)doUpload();
    });
  });
  function doUpload(){
    status.textContent='アップロード中...';
    var cacheKey=selectedPlate+'_'+type;
    var body={action:'uploadImage',key:API_KEY,plate:selectedPlate,imageType:type,images:images};
    if(mFolderIdCache[cacheKey])body.folderId=mFolderIdCache[cacheKey];
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(data){
      status.textContent='';
      if(data.error){showToast(data.error,true);}
      else{
        if(data.folderId)mFolderIdCache[cacheKey]=data.folderId;
        showToast(data.uploaded+'枚アップロード完了');
        var arrKey=type==='internal'?'imagesInternal':'imagesPublic';
        if(!originalData[arrKey])originalData[arrKey]=[];
        if(data.images)data.images.forEach(function(img){originalData[arrKey].push(img);});
        renderImageEdit(originalData);
      }
    }).catch(function(){status.textContent='';showToast('通信エラー',true);});
  }
  document.getElementById('mImgUpload_'+type).value='';
}

function mDeleteImage(fileId,type){
  if(!confirm('この画像を削除しますか？'))return;
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'deleteImage',key:API_KEY,fileId:fileId})})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){showToast(data.error,true);}
    else{
      showToast('削除しました');
      var arrKey=type==='internal'?'imagesInternal':'imagesPublic';
      if(originalData[arrKey]){originalData[arrKey]=originalData[arrKey].filter(function(img){return(typeof img==='object'?img.fileId:'')!==fileId;});}
      renderImageEdit(originalData);
    }
  }).catch(function(err){showToast('通信エラー',true);});
}

function onFieldChange(e){var el=e.target,field=el.getAttribute('data-field');el.classList.toggle('changed',el.value!==String(originalData[field]||''));updateChangeCount();}
function updateChangeCount(){var n=document.querySelectorAll('[data-field].changed').length;document.getElementById('changeCount').textContent=n===0?'変更はありません':n+'項目を変更';document.getElementById('submitBtn').disabled=n===0;}
function showStatus(type,msg){var bar=document.getElementById('statusBar');bar.style.display='block';bar.className='status-bar '+type;bar.textContent=msg;}

function submitModify(){
  if(!selectedPlate||!originalData) return;
  var changes={};
  document.querySelectorAll('[data-field].changed').forEach(function(el){changes[el.getAttribute('data-field')]=el.value;});
  if(!Object.keys(changes).length){showToast('変更がありません',true);return;}
  // 廃車ステータスへの変更時は確認
  if(changes.status&&(changes.status==='事故廃車'||changes.status==='故障廃車')){
    if(!confirm('「'+selectedPlate+'」を「'+changes.status+'」に変更しますか？\nスプレッドシートの行がグレーになります。'))return;
  }
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('loadingOverlay').classList.add('active');
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'modifyVehicle',key:API_KEY,plate:selectedPlate,changes:changes,email:''})})
    .then(function(r){return r.json();})
    .then(function(data){
      document.getElementById('loadingOverlay').classList.remove('active');
      document.getElementById('submitBtn').disabled=false;
      if(data.error) showToast(data.error,true);
      else{showToast('修正完了：'+selectedPlate);loadVehicles(function(){selectVehicle(selectedPlate);});}
    })
    .catch(function(err){document.getElementById('loadingOverlay').classList.remove('active');document.getElementById('submitBtn').disabled=false;showToast('通信エラー',true);});
}

function showToast(msg,isError){var t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}

// 起動
loadVehicles(function() {
  var params = new URLSearchParams(window.location.search);
  var plateParam = params.get('plate');
  if (plateParam) selectVehicle(decodeURIComponent(plateParam));
});
</script>
