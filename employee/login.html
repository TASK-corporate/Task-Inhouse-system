<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ログイン - 車両管理システム</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Helvetica Neue',Arial,sans-serif;background:#f3f4f6;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:16px}
    .card{background:#fff;padding:40px 28px;max-width:400px;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.08);text-align:center}
    .card h1{font-size:18px;font-weight:700;margin-bottom:8px}
    .card p{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6}
    .avatar{width:64px;height:64px;border-radius:50%;margin:0 auto 12px;background:#e5e7eb;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .user-name{font-size:16px;font-weight:600;margin-bottom:4px}
    .user-id{font-size:11px;color:#9ca3af;margin-bottom:20px;word-break:break-all}
    .btn{display:block;width:100%;padding:14px;font-size:15px;font-weight:700;border:none;cursor:pointer;margin-bottom:12px;transition:background .2s;-webkit-appearance:none;border-radius:0}
    .btn-line{background:#06C755;color:#fff}
    .btn-line:active{background:#05a648}
    .btn-primary{background:#111;color:#fff}
    .btn-primary:active{background:#333}
    .btn-primary:disabled{background:#9ca3af;cursor:not-allowed}
    .btn-secondary{background:#fff;color:#6b7280;border:1.5px solid #d1d5db;padding:12px}
    .btn-secondary:active{border-color:#111;color:#111}
    .status-msg{font-size:14px;padding:16px;margin-bottom:16px;line-height:1.6}
    .status-pending{background:#fef3c7;color:#92400e}
    .status-error{background:#fee2e2;color:#991b1b}
    .spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;margin:20px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none}
    .debug{font-size:10px;color:#d1d5db;margin-top:16px;word-break:break-all;max-height:80px;overflow-y:auto}
    .form-group{text-align:left;margin-bottom:16px}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
    .form-group input{width:100%;padding:12px;border:1.5px solid #d1d5db;font-size:16px;background:#fff;-webkit-appearance:none;border-radius:0}
    .form-group input:focus{outline:none;border-color:#111}
    .form-group .hint{font-size:11px;color:#9ca3af;margin-top:4px}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#9ca3af;font-size:13px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
    @media(max-width:380px){
      .card{padding:32px 20px}
      .card h1{font-size:16px}
      .btn{padding:12px;font-size:14px}
    }
  </style>
</head>
<body>
<div class="card">
  <!-- ローディング -->
  <div id="stateLoading">
    <h1>車両管理システム</h1>
    <p>認証中...</p>
    <div class="spinner"></div>
    <div class="debug" id="debugLog"></div>
  </div>

  <!-- PCログインフォーム -->
  <div id="statePcLogin" class="hidden">
    <h1>車両管理システム</h1>
    <p>社員専用ページです</p>
    <div class="form-group">
      <label>ログインID</label>
      <input type="text" id="pcLoginId" placeholder="ログインIDを入力" autocomplete="username" enterkeyhint="next">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="pcLoginPw" placeholder="パスワードを入力" autocomplete="current-password" enterkeyhint="done">
    </div>
    <div id="pcLoginError" class="status-msg status-error hidden"></div>
    <button class="btn btn-primary" id="pcLoginBtn" onclick="doPcLogin()">ログイン</button>
    <div class="divider">または</div>
    <button class="btn btn-line" onclick="doLiffLogin()">LINEでログイン</button>
    <div style="margin-top:16px">
      <button class="btn btn-secondary" onclick="showState('statePcApply')">新規アカウント申請</button>
    </div>
  </div>

  <!-- LIFF申請画面（LINE経由） -->
  <div id="stateApply" class="hidden">
    <h1>アクセス権限がありません</h1>
    <p>管理者の承認が必要です。<br>PCログイン用のID/パスワードも設定できます。</p>
    <div class="avatar" id="applyAvatar"></div>
    <div class="user-name" id="applyName"></div>
    <div class="user-id" id="applyUserId"></div>
    <div class="form-group">
      <label>PCログイン用ID（任意）</label>
      <input type="text" id="applyLoginId" placeholder="例）tanaka">
      <div class="hint">PCブラウザからのログインに使います</div>
    </div>
    <div class="form-group">
      <label>PCログイン用パスワード（任意）</label>
      <input type="password" id="applyLoginPw" placeholder="8文字以上推奨">
    </div>
    <button class="btn btn-primary" id="applyBtn" onclick="submitApply()">アクセスを申請する</button>
    <div id="applyResult" class="hidden"></div>
  </div>

  <!-- PC申請画面（LINE無し） -->
  <div id="statePcApply" class="hidden">
    <h1>アカウント申請</h1>
    <p>管理者の承認後にログインできるようになります</p>
    <div class="form-group">
      <label>表示名 <span style="color:#ef4444">*</span></label>
      <input type="text" id="pcApplyName" placeholder="例）田中太郎">
    </div>
    <div class="form-group">
      <label>ログインID <span style="color:#ef4444">*</span></label>
      <input type="text" id="pcApplyLoginId" placeholder="例）tanaka">
      <div class="hint">半角英数字。ログイン時に使います</div>
    </div>
    <div class="form-group">
      <label>パスワード <span style="color:#ef4444">*</span></label>
      <input type="password" id="pcApplyLoginPw" placeholder="8文字以上推奨">
    </div>
    <div id="pcApplyError" class="status-msg status-error hidden"></div>
    <button class="btn btn-primary" id="pcApplyBtn" onclick="submitPcApply()">申請する</button>
    <div style="margin-top:12px">
      <button class="btn btn-secondary" onclick="showState('statePcLogin')">← ログイン画面に戻る</button>
    </div>
  </div>

  <!-- 承認待ち -->
  <div id="stateWaiting" class="hidden">
    <h1>申請済みです</h1>
    <div class="status-msg status-pending">管理者の承認をお待ちください。<br>承認されると次回アクセス時にログインできます。</div>
  </div>

  <!-- エラー -->
  <div id="stateError" class="hidden">
    <h1>エラーが発生しました</h1>
    <div class="status-msg status-error" id="errorMsg">通信エラーが発生しました。</div>
    <button class="btn btn-primary" onclick="location.reload()">再試行</button>
  </div>
</div>

<script src="../config.js"></script>
<script>
var currentUserId='',currentName='',currentPicture='';
var allStates=['stateLoading','statePcLogin','stateApply','statePcApply','stateWaiting','stateError'];

function showState(id){allStates.forEach(function(s){document.getElementById(s).classList.toggle('hidden',s!==id);});}
function log(m){var el=document.getElementById('debugLog');if(el)el.textContent+=m+' → ';console.log('[login]',m);}
function showError(m){showState('stateError');document.getElementById('errorMsg').textContent=m;}

// パラメータ解析（LIFF liff.state対応）
var params=new URLSearchParams(window.location.search);
var liffState=params.get('liff.state');
if(liffState){
  var sp=new URLSearchParams(liffState.replace(/^\?/,''));
  sp.forEach(function(v,k){if(!params.has(k))params.set(k,v);});
}

function getTargetPage(){
  var pageMap={index:'index.html',register:'register.html',modify:'modify.html',clients:'clients.html',invoice:'invoice.html'};
  return pageMap[params.get('page')||'index']||'index.html';
}

function showApply(userId,name,picture){
  currentUserId=userId;currentName=name;currentPicture=picture||'';
  showState('stateApply');
  document.getElementById('applyName').textContent=name;
  document.getElementById('applyUserId').textContent='ID: '+userId;
  if(picture)document.getElementById('applyAvatar').innerHTML='<img src="'+picture+'">';
}

// ============================================================
// 初期化：環境判定
// ============================================================
var paramStatus=params.get('status');

if(paramStatus==='pending'&&params.get('userId')){
  showApply(params.get('userId'),params.get('name')||'','');
}else if(paramStatus==='error'){
  showError('認証エラーが発生しました。');
}else{
  // sessionStorageチェック
  try{
    var ses=sessionStorage.getItem('AUTH_SESSION');
    if(ses){var s=JSON.parse(ses);if(s.loginTime&&(Date.now()-s.loginTime)<24*3600000){window.location.href=getTargetPage();}}
  }catch(e){}

  log('LIFF SDK読込開始');
  var script=document.createElement('script');
  script.src='https://static.line-scdn.net/liff/edge/2/sdk.js';
  script.onload=function(){log('SDK読込完了');startLiff();};
  script.onerror=function(){log('SDK読込失敗→PCモード');showState('statePcLogin');};
  document.head.appendChild(script);
}

// ============================================================
// LIFF認証フロー
// ============================================================
function startLiff(){
  liff.init({liffId:APP_CONFIG.LIFF_ID}).then(function(){
    var inClient=liff.isInClient();
    var loggedIn=liff.isLoggedIn();
    log('init OK, loggedIn='+loggedIn+', inClient='+inClient);

    if(!loggedIn){
      if(inClient){
        // LINEブラウザ内 → 自動ログイン
        log('LINEブラウザ内→自動login');
        liff.login({redirectUri:window.location.href});
      }else{
        // 外部ブラウザ → PCログインフォーム
        log('外部ブラウザ→PCモード');
        showState('statePcLogin');
      }
      return;
    }

    // ログイン済み → プロフィール取得
    log('プロフィール取得中');
    liff.getProfile().then(function(profile){
      log('取得OK: '+profile.displayName+' / '+profile.userId);
      currentUserId=profile.userId;
      currentName=profile.displayName;
      currentPicture=profile.pictureUrl||'';
      checkAuthAndRedirect(currentUserId);
    }).catch(function(err){
      log('プロフィールエラー: '+err.message);
      showState('statePcLogin');
    });
  }).catch(function(err){
    log('LIFF初期化エラー: '+(err.message||err));
    showState('statePcLogin');
  });
}

function checkAuthAndRedirect(userId){
  log('GAS認証チェック');
  fetch(APP_CONFIG.GAS_URL+'?action=checkAuth&userId='+encodeURIComponent(userId)+'&key='+APP_CONFIG.API_KEY_EMPLOYEE)
    .then(function(r){return r.json();})
    .then(function(data){
      log('結果: '+JSON.stringify(data));
      if(data.authorized){
        sessionStorage.setItem('AUTH_SESSION',JSON.stringify({
          userId:userId,displayName:currentName,pictureUrl:currentPicture,loginTime:Date.now()
        }));
        window.location.href=getTargetPage();
      }else if(data.applied){
        showState('stateWaiting');
      }else{
        showApply(currentUserId,currentName,currentPicture);
      }
    })
    .catch(function(err){log('GASエラー: '+err.message);showError('サーバー通信エラー');});
}

// ============================================================
// PCログイン（ID/PW）
// ============================================================
function doPcLogin(){
  var loginId=document.getElementById('pcLoginId').value.trim();
  var loginPw=document.getElementById('pcLoginPw').value;
  if(!loginId||!loginPw){
    document.getElementById('pcLoginError').textContent='IDとパスワードを入力してください';
    document.getElementById('pcLoginError').classList.remove('hidden');return;
  }
  var btn=document.getElementById('pcLoginBtn');
  btn.disabled=true;btn.textContent='ログイン中...';
  document.getElementById('pcLoginError').classList.add('hidden');

  hashPassword(loginPw).then(function(hashed){
    fetch(APP_CONFIG.GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({
      action:'checkAuthByPassword',key:APP_CONFIG.API_KEY_EMPLOYEE,loginId:loginId,passwordHash:hashed
    })})
    .then(function(r){return r.json();})
    .then(function(data){
      btn.disabled=false;btn.textContent='ログイン';
      if(data.authorized){
        sessionStorage.setItem('AUTH_SESSION',JSON.stringify({
          userId:data.userId||loginId,displayName:data.displayName||loginId,pictureUrl:'',loginTime:Date.now()
        }));
        window.location.href=getTargetPage();
      }else{
        document.getElementById('pcLoginError').textContent=data.error||'IDまたはパスワードが正しくありません';
        document.getElementById('pcLoginError').classList.remove('hidden');
      }
    })
    .catch(function(){
      btn.disabled=false;btn.textContent='ログイン';
      document.getElementById('pcLoginError').textContent='通信エラーが発生しました';
      document.getElementById('pcLoginError').classList.remove('hidden');
    });
  });
}

// Enterキーでログイン
document.addEventListener('DOMContentLoaded',function(){
  var pwEl=document.getElementById('pcLoginPw');
  if(pwEl)pwEl.addEventListener('keydown',function(e){if(e.key==='Enter')doPcLogin();});
});

// ============================================================
// LIFF申請（LINE経由）
// ============================================================
function submitApply(){
  var btn=document.getElementById('applyBtn');
  btn.disabled=true;btn.textContent='送信中...';
  var loginId=document.getElementById('applyLoginId').value.trim();
  var loginPw=document.getElementById('applyLoginPw').value;

  function doSubmit(pwHash){
    fetch(APP_CONFIG.GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({
      action:'applyAccess',key:APP_CONFIG.API_KEY_EMPLOYEE,
      userId:currentUserId,displayName:currentName,pictureUrl:currentPicture,
      loginId:loginId,passwordHash:pwHash
    })})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.success){showState('stateWaiting');}
      else{
        var res=document.getElementById('applyResult');
        res.className='status-msg status-error';res.textContent=data.error||'エラー';
        res.classList.remove('hidden');btn.disabled=false;btn.textContent='アクセスを申請する';
      }
    })
    .catch(function(){
      btn.disabled=false;btn.textContent='アクセスを申請する';
      var res=document.getElementById('applyResult');
      res.className='status-msg status-error';res.textContent='通信エラー';res.classList.remove('hidden');
    });
  }
  if(loginPw){hashPassword(loginPw).then(doSubmit);}else{doSubmit('');}
}

// ============================================================
// PC申請（LINE無し）
// ============================================================
function submitPcApply(){
  var name=document.getElementById('pcApplyName').value.trim();
  var loginId=document.getElementById('pcApplyLoginId').value.trim();
  var loginPw=document.getElementById('pcApplyLoginPw').value;
  var errEl=document.getElementById('pcApplyError');
  if(!name){errEl.textContent='表示名を入力してください';errEl.classList.remove('hidden');return;}
  if(!loginId){errEl.textContent='ログインIDを入力してください';errEl.classList.remove('hidden');return;}
  if(!loginPw||loginPw.length<4){errEl.textContent='パスワードを4文字以上で入力してください';errEl.classList.remove('hidden');return;}
  errEl.classList.add('hidden');
  var btn=document.getElementById('pcApplyBtn');
  btn.disabled=true;btn.textContent='送信中...';

  hashPassword(loginPw).then(function(hashed){
    fetch(APP_CONFIG.GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({
      action:'applyAccess',key:APP_CONFIG.API_KEY_EMPLOYEE,
      userId:'',displayName:name,pictureUrl:'',loginId:loginId,passwordHash:hashed
    })})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.success){showState('stateWaiting');}
      else{errEl.textContent=data.error||'エラー';errEl.classList.remove('hidden');btn.disabled=false;btn.textContent='申請する';}
    })
    .catch(function(){errEl.textContent='通信エラー';errEl.classList.remove('hidden');btn.disabled=false;btn.textContent='申請する';});
  });
}

// ============================================================
// LINEログイン（PCブラウザから）
// ============================================================
function doLiffLogin(){
  if(typeof liff!=='undefined'&&liff.isReady){
    liff.login({redirectUri:window.location.href});
  }else{
    window.location.href='https://liff.line.me/'+APP_CONFIG.LIFF_ID;
  }
}

// ============================================================
// SHA-256 ハッシュ
// ============================================================
function hashPassword(pw){
  var encoder=new TextEncoder();
  return crypto.subtle.digest('SHA-256',encoder.encode(pw)).then(function(buf){
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  });
}
</script>
</body>
</html>
